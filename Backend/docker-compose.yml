version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: youtube-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 12#@12Ab
      MYSQL_DATABASE: youtube_summary_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    image: java-application
    container_name: youtube-backend
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/youtube_summary_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 12#@12Ab

volumes:
  mysql_data:
